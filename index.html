<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1a1a2e;
    }

    .counters {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #555;
    }

    .counters span {
      background: #f0f2f5;
      padding: 4px 12px;
      border-radius: 6px;
      font-weight: 500;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .input-row button {
      padding: 10px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .input-row button:active {
      background: #3730a3;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #f9fafb;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      transition: background 0.1s;
    }

    .task-item:hover {
      background: #f3f4f6;
    }

    .task-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-item .task-text {
      flex: 1;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .task-item .task-text.completed {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .task-item .delete-btn {
      padding: 4px 10px;
      background: transparent;
      color: #ef4444;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .task-item .delete-btn:hover {
      background: #ef4444;
      color: #fff;
    }

    .empty-message {
      text-align: center;
      color: #9ca3af;
      padding: 32px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>

    <div class="counters">
      <span id="totalCount">Total Tasks: 0</span>
      <span id="completedCount">Completed Tasks: 0</span>
    </div>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Enter a task..." autofocus>
      <button id="addBtn">Add</button>
    </div>

    <ul class="task-list" id="taskList"></ul>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');
    const totalCount = document.getElementById('totalCount');
    const completedCount = document.getElementById('completedCount');

    function updateCounters() {
      const items = taskList.querySelectorAll('.task-item');
      const completed = taskList.querySelectorAll('.task-item .task-text.completed');
      totalCount.textContent = `Total Tasks: ${items.length}`;
      completedCount.textContent = `Completed Tasks: ${completed.length}`;
    }

    function addTask(text) {
      const li = document.createElement('li');
      li.className = 'task-item';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';

      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = text;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = 'Delete';

      checkbox.addEventListener('change', () => {
        span.classList.toggle('completed', checkbox.checked);
        updateCounters();
      });

      deleteBtn.addEventListener('click', () => {
        li.remove();
        updateCounters();
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(deleteBtn);
      taskList.appendChild(li);

      updateCounters();
    }

    addBtn.addEventListener('click', () => {
      const text = taskInput.value.trim();
      if (text === '') return;
      addTask(text);
      taskInput.value = '';
      taskInput.focus();
    });

    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });
  </script>
</body>
</html>
